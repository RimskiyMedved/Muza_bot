<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Муза</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      /* ── Премиум: горький шоколад + золото ── */
      --bg:       #EEE0CC;
      --bg2:      #DFD0B5;
      --text:     #2A1E14;
      --hint:     rgba(60,46,34,.72);
      --btn:      #C4A882;
      --btn-text: #1A1410;

      --c-booked:   #C4788E;
      --c-free:     #6BAF8C;
      --bg-booked:  rgba(196,120,142,.26);
      --bg-free:    rgba(107,175,140,.26);
      --bg-today:   rgba(196,168,130,.35);

      --accent:      #C4A882;
      --accent-soft: rgba(196,168,130,.18);
      --gold:        #C4A882;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 64px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Loading ──────────────────────────────────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--bg2); border-top-color: var(--btn);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--hint); }

    /* ── Header ──────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      padding: 12px 16px 10px;
      border-bottom: 1px solid rgba(60,46,34,.15);
    }
    .header-eyebrow {
      text-align: center; font-size: 9px; letter-spacing: 2.5px;
      color: rgba(60,46,34,.6); text-transform: uppercase;
      font-weight: 500; margin-bottom: 8px;
    }
    .year-row {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; margin-bottom: 8px;
    }
    .year-nav {
      background: none; border: none; font-size: 14px;
      cursor: pointer; color: rgba(60,46,34,.6); padding: 2px 6px;
      border-radius: 6px; line-height: 1;
    }
    .year-nav:active { color: var(--gold); }
    .year-label { font-size: 11px; font-weight: 600; color: rgba(60,46,34,.65); letter-spacing: 1px; }
    .sync-btn {
      background: none; border: none;
      cursor: pointer; color: rgba(60,46,34,.55); padding: 4px 6px; border-radius: 8px;
      display: flex; align-items: center;
    }
    .sync-btn:active { color: var(--gold); }
    .sync-btn.spinning svg { animation: spin .8s linear infinite; }
    .month-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-btn {
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(196,168,130,.14);
      border: 1.5px solid rgba(196,168,130,.5);
      cursor: pointer; color: #8B6020;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .nav-btn:active { background: rgba(196,168,130,.18); }
    .nav-btn svg { width: 16px; height: 16px; }
    .month-title {
      font-size: 20px; font-weight: 600; color: var(--text);
      letter-spacing: -.2px; font-family: 'Cormorant Garamond', serif;
    }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      display: flex; gap: 14px; padding: 10px 14px 4px;
      font-size: 11px; color: rgba(42,30,20,.65);
      border-top: 1px solid rgba(60,46,34,.12);
      margin-top: 4px; letter-spacing: .3px; font-weight: 500;
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 5px; height: 5px; border-radius: 50%; flex-shrink: 0; }

    /* ── Weekdays ─────────────────────────────────────────────────── */
    .weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 2px clamp(5px,2vw,12px) 0;
    }
    .weekday-label {
      text-align: center; font-size: clamp(8px,2.2vw,10px);
      color: rgba(196,168,130,.35); padding: 4px 0; font-weight: 500;
      letter-spacing: .8px; text-transform: uppercase;
    }
    .weekday-label.wknd { color: rgba(196,120,142,.4); }

    /* ── Calendar grid ─────────────────────────────────────────────── */
    .calendar-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: clamp(3px,.9vw,5px);
      padding: 4px clamp(5px,2vw,12px) 6px;
    }
    .day-cell {
      aspect-ratio: 1; border-radius: clamp(10px,3vw,14px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: transform .15s, opacity .15s;
      user-select: none;
      background: rgba(0,0,0,.04);
    }
    .day-cell:active:not(.empty) { transform: scale(.82); }
    .day-cell.empty   { cursor: default; pointer-events: none; background: transparent; }
    .day-cell.booked  { background: var(--bg-booked); }
    .day-cell.free    { background: var(--bg-free); }
    .day-cell.past    { opacity: .2; }
    .day-cell.today   { background: var(--bg-today); border: 1px solid rgba(196,168,130,.45); }
    .day-cell.wknd-col .day-number { color: rgba(139,58,82,.65); }

    .day-number {
      font-size: clamp(12px,3.6vw,15px); font-weight: 500; line-height: 1;
      color: rgba(42,30,20,.7);
    }
    .day-cell.booked  .day-number { color: #8B3A52; font-weight: 600; }
    .day-cell.free    .day-number { color: #2E7A56; font-weight: 600; }
    .day-cell.today   .day-number { color: var(--gold); font-weight: 600; }

    /* Status dot — only for neutral/booked-no-name cells */
    .status-dot {
      width: 3px; height: 3px; border-radius: 50%; margin-top: 2px;
    }
    .day-cell.booked  .status-dot { background: #C4788E; }
    .day-cell.neutral .status-dot { background: transparent; }

    .day-name {
      font-size: clamp(5.5px,1.5vw,7px); margin-top: 1.5px;
      max-width: 90%; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; text-align: center; line-height: 1.1; font-weight: 500;
    }
    .day-cell.booked .day-name { color: rgba(139,58,82,.75); }
    .day-cell.free   .day-name { color: rgba(46,122,86,.75); }

    /* Source badge */
    .src-badge {
      position: absolute; top: 3px; right: 4px;
      font-size: clamp(4.5px,1.2vw,6px); font-weight: 700;
      color: rgba(139,58,82,.85); line-height: 1;
      letter-spacing: -.2px;
    }

    /* ── Mini stats ────────────────────────────────────────────────── */
    .cal-mini-stats {
      padding: 6px 14px 14px;
    }
    .cal-mini-total {
      font-size: 12px; font-weight: 700; color: var(--gold);
      margin-bottom: 6px; display: block;
    }
    .cal-mini-chips { display: flex; flex-wrap: wrap; gap: 5px; }
    .cal-mini-chip {
      background: rgba(60,46,34,.08); border-radius: 100px;
      padding: 4px 11px; font-size: 11px; color: rgba(42,30,20,.78); font-weight: 600;
      border: 1px solid rgba(60,46,34,.18);
    }

    /* ── FAB ──────────────────────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 74px; right: 16px;
      background: rgba(196,168,130,.22);
      color: #8B6020;
      border: 1.5px solid rgba(196,168,130,.65); border-radius: 50%;
      width: 52px; height: 52px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
      z-index: 20; display: flex; align-items: center; justify-content: center;
      transition: transform .12s, background .15s;
    }
    .fab:active { transform: scale(.88); background: rgba(196,168,130,.22); }

    /* ── Stats ─────────────────────────────────────────────────────── */
    #statsView { display: none; }

    .stats-month-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 8px;
      border-bottom: 1px solid rgba(60,46,34,.15);
      position: sticky; top: 0; background: var(--bg); z-index: 5;
    }
    .stats-nav-btn {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(196,168,130,.12);
      border: 1.5px solid rgba(196,168,130,.45);
      cursor: pointer; color: #8B6020;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .stats-nav-btn:active { opacity: .6; }
    .stats-month-title { font-size: 16px; font-weight: 700; text-align: center; }
    .stats-all-btn {
      background: none; border: none; font-size: 12px; font-weight: 600;
      color: rgba(60,46,34,.55); cursor: pointer; padding: 6px 8px;
      border-radius: 8px; white-space: nowrap;
    }
    .stats-all-btn.active { color: var(--gold); }
    .stats-all-btn:active { opacity: .6; }

    .stats-body { padding: 14px; }

    /* Bento grid */
    .stats-bento {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 6px;
    }
    .stat-card {
      background: rgba(0,0,0,.04); border-radius: 18px;
      padding: 16px 14px; border: 1px solid rgba(196,168,130,.08);
    }
    .stat-card.stat-wide {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
    }
    .stat-number {
      font-size: 32px; font-weight: 800; line-height: 1;
      color: #7A2E44; letter-spacing: -.5px;
    }
    .stat-card.stat-wide .stat-number { font-size: 42px; }
    .stat-label  {
      font-size: 12px; font-weight: 500;
      color: var(--hint); margin-bottom: 6px; line-height: 1.3;
    }
    .stat-wide-badges {
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .stat-pill {
      background: rgba(196,168,130,.12); color: var(--gold);
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
    }
    .stat-guests-pill {
      background: rgba(107,168,130,.12); color: var(--c-free);
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
    }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 22px 0 10px;
    }
    .stats-section-title {
      font-size: 12px; font-weight: 700; color: var(--hint);
      text-transform: uppercase; letter-spacing: .6px;
    }

    /* Filter pill */
    .filter-pill {
      display: flex; align-items: center; gap: 5px;
      background: rgba(0,0,0,.05); border: 1px solid rgba(196,168,130,.15);
      border-radius: 100px; padding: 5px 12px; font-size: 12px; color: rgba(240,232,220,.7);
      cursor: pointer; font-family: inherit; font-weight: 500;
    }
    .filter-pill:active { opacity: .7; }
    .filter-pill.active { background: var(--gold); color: var(--btn-text); border-color: var(--gold); }
    .filter-pill-badge {
      background: rgba(0,0,0,.07); border-radius: 8px;
      padding: 1px 5px; font-size: 10px; font-weight: 700;
    }

    /* Month chart — pill bars */
    .month-chart {
      display: flex; align-items: flex-end; gap: 4px;
      overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: none;
    }
    .month-chart::-webkit-scrollbar { display: none; }
    .month-bar-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; min-width: 32px; flex-shrink: 0;
      cursor: pointer; padding: 0 1px;
    }
    .month-bar-wrap:active { opacity: .7; }
    .month-bar-inner { height: 70px; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
    .month-bar {
      width: 100%; background: rgba(0,0,0,.06);
      border-radius: 100px;
      transition: height .3s, background .2s; min-height: 4px;
    }
    .month-bar.has-data { background: var(--gold); opacity: .5; }
    .month-bar-wrap.active .month-bar { background: var(--gold) !important; opacity: 1; }
    .month-val {
      font-size: 10px; font-weight: 700; color: var(--hint);
      min-height: 13px; text-align: center; line-height: 1;
    }
    .month-bar-wrap.active .month-val   { color: var(--c-booked); }
    .month-bar-wrap.active .month-label { color: var(--btn); font-weight: 600; }
    .month-label-line1 { font-size: 9px; color: var(--hint); text-align: center; line-height: 1.2; font-weight: 500; }
    .month-label-line2 { font-size: 8px; color: var(--hint); opacity: .6; text-align: center; line-height: 1; }

    /* Source rows */
    .source-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; cursor: pointer;
    }
    .source-row + .source-row { border-top: 1px solid rgba(196,168,130,.08); }
    .source-row-active { background: rgba(196,168,130,.08); border-radius: 12px; padding: 10px 8px; margin: 0 -8px; }
    .source-name  { font-size: 14px; flex: 1; font-weight: 500; }
    .source-guests { font-size: 11px; color: var(--hint); margin-top: 2px; }
    .source-count { font-size: 15px; font-weight: 700; color: var(--gold); min-width: 26px; text-align: right; }
    .source-bar-wrap { width: 56px; height: 3px; background: var(--bg2); border-radius: 100px; overflow: hidden; }
    .source-bar {
      height: 100%; background: var(--accent); border-radius: 100px;
      opacity: .6; transition: width .4s;
    }
    /* Группировка источников */
    .src-row {
      display: flex; align-items: center; gap: 8px;
      padding: 11px 0; cursor: pointer;
    }
    .src-row + .src-row,
    .src-child + .src-row,
    .src-row + .src-child { border-top: 1px solid rgba(196,168,130,.08); }
    .src-row.active { background: rgba(196,168,130,.09); border-radius: 12px; padding: 11px 8px; margin: 0 -8px; }

    .src-label { flex: 1; }
    .src-name  { font-size: 14px; font-weight: 600; }
    .src-sub   { font-size: 11px; color: var(--hint); margin-top: 1px; }
    .src-bar-wrap { width: 48px; height: 3px; background: rgba(196,168,130,.12); border-radius: 100px; flex-shrink: 0; }
    .src-bar      { height: 100%; background: var(--gold); border-radius: 100px; opacity: .6; }
    .src-count    { font-size: 15px; font-weight: 700; color: var(--gold); width: 28px; text-align: right; flex-shrink: 0; }
    .src-arrow    {
      font-size: 12px; color: var(--hint); width: 18px; text-align: center;
      flex-shrink: 0; transition: transform .22s ease;
    }
    .src-arrow.open { transform: rotate(90deg); }

    /* Дочерние строки */
    .src-child {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 0 8px 16px;
      border-top: 1px solid rgba(0,0,0,.10);
    }
    .src-child.active { background: rgba(196,168,130,.08); border-radius: 10px; padding: 8px 8px 8px 22px; margin: 0 -8px; }
    .src-child-name  { flex: 1; font-size: 13px; color: var(--hint); font-weight: 500; }
    .src-child-count { font-size: 13px; font-weight: 700; color: var(--gold); width: 28px; text-align: right; flex-shrink: 0; }
    .src-child-x     { font-size: 10px; color: var(--hint); width: 14px; text-align: right; flex-shrink: 0; }

    .stats-loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 40px; color: var(--hint); font-size: 14px;
    }
    .small-spinner {
      width: 18px; height: 18px; border: 2px solid var(--bg2); border-top-color: var(--btn);
      border-radius: 50%; animation: spin .7s linear infinite;
    }

    /* ── Bottom nav ───────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg);
      border-top: 1px solid rgba(60,46,34,.15);
      display: flex; height: 58px; z-index: 30;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; background: none; border: none;
      cursor: pointer; color: rgba(60,46,34,.55);
      font-size: 0; transition: color .15s; position: relative;
    }
    .nav-tab svg { width: 22px; height: 22px; }
    .nav-tab.active { color: var(--gold); }
    .nav-tab.active::after {
      content: ""; position: absolute; bottom: 8px;
      width: 4px; height: 4px; border-radius: 50%;
      background: var(--gold); opacity: .7;
    }

    /* ── Sheet / overlay ──────────────────────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.55);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity .22s; backdrop-filter: blur(6px);
    }
    .sheet-overlay.visible { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: #D8C6AD; border-radius: 24px 24px 0 0;
      border-top: 2px solid rgba(60,46,34,.18);
      z-index: 50; transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      max-height: 92vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet.visible { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 3px; background: rgba(60,46,34,.25);
      border-radius: 100px; margin: 10px auto 0;
    }
    .sheet-header {
      padding: 12px 16px 0;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .sheet-title { font-size: 18px; font-weight: 600; color: var(--text); }
    .sheet-date  { font-size: 12px; color: rgba(42,30,20,.55); margin-top: 4px; letter-spacing: .2px; font-weight: 500; }
    .close-btn {
      background: rgba(60,46,34,.08); border: 1.5px solid rgba(60,46,34,.22);
      border-radius: 50%; width: 30px; height: 30px; font-size: 15px;
      cursor: pointer; color: rgba(42,30,20,.65); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:active { opacity: .6; }

    /* ── Booking detail ───────────────────────────────────────────── */
    .booking-detail { padding: 12px 16px 4px; }
    .detail-card {
      background: rgba(0,0,0,.04); border-radius: 16px; overflow: hidden;
      border: 1.5px solid rgba(60,46,34,.15);
    }
    .detail-row {
      display: flex; align-items: flex-start;
      padding: 11px 14px; gap: 12px;
    }
    .detail-row + .detail-row { border-top: 1px solid rgba(60,46,34,.1); }
    .detail-label { font-size: 12px; color: rgba(42,30,20,.5); min-width: 88px; flex-shrink: 0; padding-top: 1px; font-weight: 600; letter-spacing: .2px; }
    .detail-value { font-size: 14px; font-weight: 500; word-break: break-word; flex: 1; color: var(--text); }

    /* ── Form ──────────────────────────────────────────────────────── */
    .form-body { padding: 12px 16px 4px; display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; color: rgba(42,30,20,.7); font-weight: 700; letter-spacing: .2px; }
    .form-input {
      background: rgba(0,0,0,.06); border: 1.5px solid rgba(60,46,34,.25);
      border-radius: 13px; padding: 12px 14px;
      font-size: 15px; color: var(--text); width: 100%;
      outline: none; transition: border-color .15s, background .15s; font-family: inherit;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: #8B3A52; background: rgba(139,58,82,.06); }
    .form-textarea {
      background: rgba(0,0,0,.06); border: 1.5px solid rgba(60,46,34,.25);
      border-radius: 13px; padding: 12px 14px;
      font-size: 15px; color: var(--text); width: 100%;
      outline: none; resize: none; min-height: 72px;
      transition: border-color .15s, background .15s; font-family: inherit;
    }
    .form-textarea:focus { border-color: #8B3A52; background: rgba(139,58,82,.06); }

    /* Stepper */
    .stepper {
      display: flex; align-items: center;
      background: rgba(0,0,0,.06); border-radius: 13px;
      border: 1.5px solid rgba(60,46,34,.25);
    }
    .step-btn {
      width: 48px; height: 48px; background: none; border: none;
      font-size: 22px; color: #8B6020;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border-radius: 13px; font-weight: 300;
    }
    .step-btn:active { background: rgba(0,0,0,.06); }
    .step-input {
      flex: 1; background: none; border: none; outline: none;
      text-align: center; font-size: 17px; font-weight: 700;
      color: var(--text); font-family: inherit;
      -webkit-appearance: none; appearance: none;
      min-width: 0; padding: 0;
    }
    .step-input::-webkit-inner-spin-button,
    .step-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .section-sep {
      font-size: 11px; font-weight: 700; color: var(--hint);
      text-transform: uppercase; letter-spacing: .6px; padding-top: 2px;
    }

    /* Source chip selector */
    .chip-selector { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip-option {
      padding: 7px 14px; border-radius: 100px; font-size: 13px;
      border: 1.5px solid rgba(60,46,34,.25); background: rgba(60,46,34,.05);
      color: rgba(42,30,20,.8); cursor: pointer;
      transition: all .15s; user-select: none; font-weight: 500;
    }
    .chip-option.selected {

</head>

<script>
// ─── Telegram WebApp ──────────────────────────────────────────────────────────
const twa = window.Telegram?.WebApp;
if (twa) { twa.ready(); twa.expand(); }
const initData = twa?.initData || "";

// Haptic helpers
const haptic = {
  light:   () => twa?.HapticFeedback?.impactOccurred("light"),
  medium:  () => twa?.HapticFeedback?.impactOccurred("medium"),
  success: () => twa?.HapticFeedback?.notificationOccurred("success"),
  error:   () => twa?.HapticFeedback?.notificationOccurred("error"),
  select:  () => twa?.HapticFeedback?.selectionChanged(),
};

// MainButton helpers
let _mbCb = null;
function showMainBtn(text, cb) {
  if (!twa?.MainButton) return;
  if (_mbCb) twa.MainButton.offClick(_mbCb);
  _mbCb = cb;
  twa.MainButton.setText(text);
  twa.MainButton.onClick(_mbCb);
  twa.MainButton.show();
}
function hideMainBtn() {
  if (!twa?.MainButton) return;
  if (_mbCb) { twa.MainButton.offClick(_mbCb); _mbCb = null; }
  twa.MainButton.hide();
}

// BackButton helpers
let _bbCb = null;
function showBackBtn(cb) {
  if (!twa?.BackButton) return;
  if (_bbCb) twa.BackButton.offClick(_bbCb);
  _bbCb = cb;
  twa.BackButton.onClick(_bbCb);
  twa.BackButton.show();
}
function hideBackBtn() {
  if (!twa?.BackButton) return;
  if (_bbCb) { twa.BackButton.offClick(_bbCb); _bbCb = null; }
  twa.BackButton.hide();
}

// ─── SVG Icons ────────────────────────────────────────────────────────────────
const ICO = {
  pencil: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  save:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  back:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  warn:   `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

// ─── State ────────────────────────────────────────────────────────────────────
let currentView = "calendar";
let currentYear = new Date().getFullYear();
let currentMon  = new Date().getMonth() + 1;
let calData     = null;
let sourcesData   = [];
let _activeSource = "";   // фильтр по источнику в статистике
let _allSources   = {};
let _formSource   = "";

// ─── Weekday header ───────────────────────────────────────────────────────────
const WD = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const wdHeader = document.getElementById("weekdayHeader");
WD.forEach((d, i) => {
  const el = document.createElement("div");
  el.className = "weekday-label" + (i >= 4 ? " wknd" : "");
  el.textContent = d;
  wdHeader.appendChild(el);
});

// ─── API ──────────────────────────────────────────────────────────────────────
const API = window.location.origin;
async function apiFetch(method, path, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json", "X-Init-Data": initData },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    // Сессия истекла (initData старше 24ч) — просим перезайти
    if (res.status === 401) {
      showToast("Сессия истекла. Закройте и откройте приложение заново.");
      throw new Error("Сессия истекла");
    }
    if (res.status === 403) {
      showToast("Нет доступа. Обратитесь к администратору.");
      throw new Error("Нет доступа");
    }
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.getElementById("calendarView").style.display  = view === "calendar" ? "block" : "none";
  document.getElementById("statsView").style.display     = view === "stats"    ? "block" : "none";
  document.getElementById("adminView").style.display     = view === "admin"    ? "block" : "none";
  document.getElementById("listView").style.display      = view === "list"     ? "block" : "none";
  document.getElementById("calHeader").style.display     = view === "calendar" ? "block" : "none";
  document.getElementById("fabBtn").style.display        = view === "calendar" ? "flex"  : "none";
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  const tabEl = document.getElementById(`tab-${view}`);
  if (tabEl) tabEl.classList.add("active");
  haptic.select();
  if (view === "stats") loadStats();

async function loadMonth() {

// ─── Render calendar ──────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById("yearLabel").textContent  = calData.year;
  document.getElementById("monthTitle").textContent = calData.month_name;

  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  for (let i = 0; i < calData.first_weekday; i++) {
    const blank = document.createElement("div");
    blank.className = "day-cell empty";
    grid.appendChild(blank);
  }

  calData.days.forEach(day => {
    const cell = document.createElement("div");
    const cls  = ["day-cell", day.status];
    if (day.past)  cls.push("past");
    if (day.today) cls.push("today");
    const wd = new Date(
      parseInt(day.date.slice(6)), parseInt(day.date.slice(3,5))-1, parseInt(day.date.slice(0,2))
    ).getDay();
    if (wd === 0 || wd === 5 || wd === 6) cls.push("wknd-col");
    cell.className = cls.join(" ");

    const num = document.createElement("div");
    num.className   = "day-number";
    num.textContent = day.day;
    cell.appendChild(num);

    // Status dot — only for neutral cells (no dot for free or booked-with-name)
    if (day.status !== "free" && !(day.status === "booked" && day.name)) {
      const dot = document.createElement("div");
      dot.className = "status-dot";
      cell.appendChild(dot);
    }

    // Name inside cell
    if (day.status === "booked" && day.name) {
      const nm = document.createElement("div");
      nm.className   = "day-name";
      nm.textContent = day.name.split(" ")[0];
      cell.appendChild(nm);
    } else if (day.status === "free") {
      const nm = document.createElement("div");
      nm.className   = "day-name";
      nm.textContent = "Своб.";
      cell.appendChild(nm);
    }

    // Source badge (booked only)
    if (day.status === "booked" && day.source) {
      const badge = document.createElement("div");
      badge.className   = "src-badge";
      badge.textContent = day.source.replace(/\s+/g, "").slice(0, 2);
      cell.appendChild(badge);
    }

    cell.addEventListener("click", () => {
      haptic.light();
      onDayClick(day);
    });
    grid.appendChild(cell);
  });

  document.getElementById("loadingOverlay").classList.add("hidden");
  renderMiniStats();
}

// ─── Mini stats ───────────────────────────────────────────────────────────────
function renderMiniStats() {
  const el = document.getElementById("calMiniStats");
  if (!el || !calData) return;
  const booked = calData.days.filter(d => d.status === "booked");
  if (booked.length === 0) {
    el.innerHTML = '<span class="cal-mini-total" style="color:var(--hint)">Броней нет</span>';
    return;
  }
  const srcMap = {};
  booked.forEach(d => { const s = d.source || "—"; srcMap[s] = (srcMap[s]||0)+1; });
  const n    = booked.length;
  const word = _plural(n, "бронь", "брони", "броней");
  const chips = Object.entries(srcMap).sort((a,b)=>b[1]-a[1])
    .map(([s,c]) => `<span class="cal-mini-chip">${escHtml(s.length>13?s.slice(0,13)+"…":s)}: ${c}</span>`)
    .join("");
  el.innerHTML = `<span class="cal-mini-total">${n} ${word}</span><div class="cal-mini-chips">${chips}</div>`;
}

// ─── Source grouping ──────────────────────────────────────────────────────────
let _expandedGroups = new Set();

function _groupSources(bySource) {
  // bySource = { "Таня ВК": {count,guests}, "Таня": {count,guests}, ... }
  const groups = {};
  Object.entries(bySource).forEach(([src, data]) => {
    const cnt    = typeof data === "number" ? data : (data.count || 0);
    const guests = typeof data === "number" ? 0    : (data.guests || 0);
    const key    = src.split(/\s+/)[0]; // первое слово
    if (!groups[key]) groups[key] = { count: 0, guests: 0, children: {} };
    groups[key].count  += cnt;
    groups[key].guests += guests;
    groups[key].children[src] = { count: cnt, guests };
  });
  return groups;
}

function _renderSources(bySource, maxCount) {
  const groups = _groupSources(bySource);
  let html = "";
  Object.entries(groups)
    .sort((a,b) => b[1].count - a[1].count)
    .forEach(([key, g]) => {
      const childEntries = Object.entries(g.children).sort((a,b) => b[1].count - a[1].count);
      const hasChildren  = childEntries.length > 1;
      const isExpanded   = _expandedGroups.has(key);
      const isActive     = _activeSource === key || childEntries.some(([s]) => _activeSource === s);
      const barW         = Math.round(g.count / maxCount * 100);
      const guestsHtml   = g.guests > 0 ? `<div class="src-sub">${g.guests} гостей</div>` : "";

      if (hasChildren) {
        html += `<div class="src-row${isActive ? " active" : ""}" data-toggle-group="${escHtml(key)}">
          <div class="src-label">
            <div class="src-name">${escHtml(key)}</div>
            ${guestsHtml}
          </div>
          <div class="src-bar-wrap"><div class="src-bar" style="width:${barW}%"></div></div>
          <div class="src-count">${g.count}</div>
          <div class="src-arrow${isExpanded ? " open" : ""}">›</div>
        </div>`;
        if (isExpanded) {
          childEntries.forEach(([src, d]) => {
            const cActive  = _activeSource === src;
            const cGuests  = d.guests > 0 ? ` · ${d.guests} г.` : "";
            html += `<div class="src-child${cActive ? " active" : ""}" data-toggle-source="${escHtml(src)}">
              <div class="src-child-name">${escHtml(src)}${cGuests ? `<span style="font-size:10px;opacity:.6">${cGuests}</span>` : ""}</div>
              <div class="src-child-count">${d.count}</div>
              <div class="src-child-x">${cActive ? "✕" : ""}</div>
            </div>`;
          });
        }
      } else {
        const src    = childEntries[0]?.[0] || key;
        const srcAct = _activeSource === src;
        html += `<div class="src-row${srcAct ? " active" : ""}" data-toggle-source="${escHtml(src)}">
          <div class="src-label">
            <div class="src-name">${escHtml(src)}</div>
            ${guestsHtml}
          </div>
          <div class="src-bar-wrap"><div class="src-bar" style="width:${barW}%"></div></div>
          <div class="src-count">${g.count}</div>
          <div class="src-arrow">${srcAct ? "✕" : ""}</div>
        </div>`;
      }
    });
  return html || `<div style="text-align:center;color:var(--hint);padding:20px;font-size:14px">Нет данных</div>`;
}

function statsToggleGroup(key) {
  haptic.select();
  if (_expandedGroups.has(key)) _expandedGroups.delete(key);
  else _expandedGroups.add(key);
  // перерисовываем только секцию источников
  const el = document.querySelector(".stats-sources-section");
  if (!el || !_lastStatsData) { loadStats(); return; }
  const bySource = _lastStatsData.by_source;
  const maxSrc   = Math.max(1, ...Object.values(bySource).map(v => typeof v === "number" ? v : v.count));
  el.innerHTML   = _renderSources(bySource, maxSrc);
}

let _lastStatsData = null;

// ─── Stats state ──────────────────────────────────────────────────────────────
const MONTH_NAMES_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь",
                        "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
let statsYear    = new Date().getFullYear();
let statsMon     = new Date().getMonth() + 1;
let statsAllMode = true;   // true = все время, false = конкретный месяц

function _statsMonthKey() {
  return statsAllMode ? "" : `${String(statsMon).padStart(2,"0")}.${statsYear}`;
}

function _updateStatsNav() {

function statsShowAll() {
  haptic.select();

document.getElementById("statsPrevBtn").addEventListener("click", () => {

document.getElementById("statsNextBtn").addEventListener("click", () => {

// ─── Stats ────────────────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById("statsContent");
  el.innerHTML = '<div class="stats-loading"><div class="small-spinner"></div>Загружаем…</div>';
  try {
    const params = new URLSearchParams();
    const monthKey = _statsMonthKey();
    if (monthKey)      params.set("month",  monthKey);
    if (_activeSource) params.set("source", _activeSource);
    const qs = params.toString() ? "?" + params.toString() : "";
    const s = await apiFetch("GET", "/api/stats" + qs);

    _lastStatsData = s;
    _allSources    = s.by_source;

    // Month chart bars
    const keys = s.by_month.keys || [];
    const maxM = Math.max(1, ...s.by_month.counts);
    const monthBars = s.by_month.labels.map((lbl, i) => {
      const cnt    = s.by_month.counts[i];
      const key    = keys[i] || "";
      const active = !statsAllMode && _statsMonthKey() === key;
      const h      = Math.max(4, Math.round(cnt / maxM * 70));
      const parts  = lbl.split(" ");
      return `
        <div class="month-bar-wrap${active ? " active" : ""}"
             onclick="statsGoToMonth(${JSON.stringify(key)})">
          <div class="month-val">${cnt || ""}</div>
          <div class="month-bar-inner">
            <div class="month-bar${cnt > 0 ? " has-data" : ""}" style="height:${h}px"></div>
          </div>
          <div class="month-label-line1">${escHtml(parts[0]||lbl)}</div>
          <div class="month-label-line2">${escHtml(parts[1]||"")}</div>
        </div>`;
    }).join("");

    // Source rows — grouped by first word
    const bySource = s.by_source;
    const maxSrc   = Math.max(1, ...Object.values(bySource).map(v => typeof v === "number" ? v : (v.count||0)));
    const srcHtml  = _renderSources(bySource, maxSrc);

    // Bento cards
    const monthLabel = !statsAllMode ? MONTH_NAMES_RU[statsMon-1] + " " + statsYear : "";
    const srcLabel   = _activeSource ? `<span style="color:var(--accent)"> · ${escHtml(_activeSource)}</span>` : "";
    const guestsBadge = s.total_guests > 0
      ? `<span class="stat-guests-pill">${s.total_guests} гостей</span>` : "";
    const futureBadge = statsAllMode
      ? `<span class="stat-pill">${s.future} впереди</span>` : "";

    el.innerHTML = `
      <div class="stats-bento">
        <div class="stat-card stat-wide">
          <div>
            <div class="stat-label">${monthLabel ? escHtml(monthLabel) : "Все время"}${srcLabel}</div>
            <div class="stat-number">${s.total}</div>
          </div>
          <div class="stat-wide-badges">
            ${futureBadge}
            ${guestsBadge}
          </div>
        </div>
        ${statsAllMode ? `
        <div class="stat-card">
          <div class="stat-label">${escHtml(s.this_month_name)}</div>
          <div class="stat-number">${s.this_month}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">${escHtml(s.next_month_name)}</div>
          <div class="stat-number">${s.next_month}</div>
        </div>` : ""}
      </div>

      <div class="section-header">
        <div class="stats-section-title">По месяцам</div>
      </div>
      <div class="month-chart">${monthBars}</div>

      <div class="section-header" style="margin-top:22px">
        <div class="stats-section-title">По источникам</div>
        ${_activeSource ? `<button class="filter-pill active" onclick="statsToggleSource('')">Сбросить</button>` : ""}
      </div>
      <div class="stats-sources-section">${srcHtml}</div>
    `;

    // Scroll active month bar into view
    if (!statsAllMode) {
      setTimeout(() => {
        const active = document.querySelector(".month-bar-wrap.active");
        if (active) active.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
      }, 100);
    }
  } catch (e) {
    el.innerHTML = `<div class="stats-loading" style="color:var(--c-booked)">Ошибка: ${e.message}</div>`;
  }
}

function statsGoToMonth(key) {
  // key = "MM.YYYY"
  haptic.select();
  if (!key) return;
  const [mm, yyyy] = key.split(".");
  statsMon     = parseInt(mm);
  statsYear    = parseInt(yyyy);
  statsAllMode = false;
  _activeSource = "";
  _updateStatsNav();
  loadStats();
}

function statsToggleSource(src) {
  haptic.select();
  _activeSource = _activeSource === src ? "" : src;
  loadStats();
}

  const fields = [
    ["Клиент",      day.name             ],
    ["Гости",       day.guests           ],

// ─── Form build ───────────────────────────────────────────────────────────────

  const dateF = showDateField
    ? `<div class="form-group">
        <label class="form-label">Дата</label>
        <input class="form-input" id="f-date" type="text"
               placeholder="ДД.ММ.ГГГГ" value="${escHtml(data.date||"")}" />
      </div>`
    : `<input type="hidden" id="f-date" value="${escHtml(data.date||"")}" />`;

  return `<div class="form-body">
    ${dateF}
    <div class="form-group">
      <label class="form-label">Имя клиента</label>
      <input class="form-input" id="f-name" type="text"
             placeholder="Иван Петров" value="${escHtml(data.name||"")}" />
    </div>
    <div class="form-group">
      <label class="form-label">Количество гостей</label>
      <div class="stepper">
        <button class="step-btn" type="button" onclick="stepGuests(-10)">−</button>
        <input class="step-input" id="f-guests" type="number" min="0" step="10"
               inputmode="numeric" placeholder="0"
               value="${escHtml(data.guests||"")}" />
        <button class="step-btn" type="button" onclick="stepGuests(10)">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Телефон</label>
      <input class="form-input" id="f-phone" type="tel"
             placeholder="+7 900 000 00 00"
             value="${escHtml(fmtPhone(data.phone||""))}" />
    </div>
    <div class="section-sep">Дополнительно</div>
    <div class="form-group">
      <label class="form-label">Источник рекламы</label>
      <div class="chip-selector" id="srcChips"></div>
      <div class="chip-custom-wrap" id="chipCustomWrap">
        <input class="chip-custom-input" id="f-source-custom"
               type="text" placeholder="Введите источник…" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Тип клиента</label>
      <input class="form-input" id="f-client_type" type="text"
             placeholder="Прямой клиент / Агентство"
             value="${escHtml(data.client_type||"")}" />
    </div>
    <div class="form-group">
      <label class="form-label">Комментарий</label>
      <textarea class="form-textarea" id="f-comment"
                placeholder="Пожелания, заметки…">${escHtml(data.comment||"")}</textarea>
    </div>
  </div>`;
}

// ─── Form widgets ─────────────────────────────────────────────────────────────
function initFormWidgets(data) {
  _formSource = data.source || "";
  renderChipSelector();
}

function stepGuests(delta) {
  haptic.select();
  const el = document.getElementById("f-guests");
  if (!el) return;
  const v = parseInt(el.value) || 0;
  el.value = Math.max(0, v + delta) || "";
}

function renderChipSelector() {
  const wrap = document.getElementById("srcChips");
  if (!wrap) return;

  const isCustom = _formSource && !sourcesData.includes(_formSource);
  const srcs = sourcesData.length ? [...sourcesData, "__other__"] : ["__other__"];

  wrap.innerHTML = srcs.map(s => {
    const lbl    = s === "__other__" ? "Другое…" : s;
    const active = (s === _formSource) || (s === "__other__" && isCustom);
    return `<div class="chip-option${active ? " selected" : ""}" data-src="${escHtml(s)}">${escHtml(lbl)}</div>`;
  }).join("");

  wrap.querySelectorAll(".chip-option").forEach(el => {
    el.addEventListener("click", () => {
      haptic.select();
      const src = el.dataset.src;
      wrap.querySelectorAll(".chip-option").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      const customWrap  = document.getElementById("chipCustomWrap");
      const customInput = document.getElementById("f-source-custom");
      if (src === "__other__") {
        if (customWrap)  customWrap.style.display  = "block";
        if (customInput) { customInput.focus(); _formSource = customInput.value || ""; }
        if (customInput) customInput.oninput = e => { _formSource = e.target.value; };
      } else {
        _formSource = src;
        if (customWrap)  customWrap.style.display  = "none";
        if (customInput) customInput.value = "";
      }
    });
  });

  const customWrap  = document.getElementById("chipCustomWrap");
  const customInput = document.getElementById("f-source-custom");
  if (isCustom && customWrap && customInput) {
    customWrap.style.display = "block";
    customInput.value = _formSource;
    customInput.oninput = e => { _formSource = e.target.value; };
  }
}

function getFormData() {
  const customWrap  = document.getElementById("chipCustomWrap");
  const customInput = document.getElementById("f-source-custom");
  const isCustom    = customWrap && customWrap.style.display !== "none";
  const finalSource = isCustom ? (customInput?.value?.trim() || _formSource) : _formSource;
  return {
    date:        document.getElementById("f-date")?.value.trim()        || "",
    name:        document.getElementById("f-name")?.value.trim()        || "",
    guests:      document.getElementById("f-guests")?.value.trim()      || "",

    client_type: document.getElementById("f-client_type")?.value.trim() || "",
    comment:     document.getElementById("f-comment")?.value.trim()     || "",
  };
}

// ─── Submit ───────────────────────────────────────────────────────────────────
async function submitAdd() {
  const data = getFormData();
  if (!data.date) { haptic.error(); showToast("Укажите дату"); return; }
  if (!/^\d{2}\.\d{2}\.\d{4}$/.test(data.date)) { haptic.error(); showToast("Формат: ДД.ММ.ГГГГ"); return; }
  if (!data.name) { haptic.error(); showToast("Укажите имя клиента"); return; }
  try {
    setSheetLoading(true);
    await apiFetch("POST", "/api/booking", data);
    haptic.success();
    closeSheet(); showToast("Бронь добавлена");
    await loadMonth();
  } catch (e) { haptic.error(); showToast("Ошибка: " + e.message); }
  finally { setSheetLoading(false); }
}

async function submitEdit(dateStr) {
  const data = { ...getFormData(), date: dateStr };
  if (!data.name) { haptic.error(); showToast("Укажите имя клиента"); return; }
  try {
    setSheetLoading(true);
    await apiFetch("PUT", `/api/booking/${encodeURIComponent(dateStr)}`, data);
    haptic.success();
    closeSheet(); showToast("Бронь обновлена");
    await loadMonth();
  } catch (e) { haptic.error(); showToast("Ошибка: " + e.message); }
  finally { setSheetLoading(false); }
}

// ─── Utils ────────────────────────────────────────────────────────────────────
function fmtDate(s) {
  try {
    const [d, m, y] = s.split(".").map(Number);
    return new Date(y, m-1, d).toLocaleDateString("ru-RU",
      { day:"numeric", month:"long", year:"numeric", weekday:"long" });
  } catch { return s; }
}

function fmtPhone(p) {
  if (!p) return "";
  p = p.trim();
  if (p.startsWith("+")) return p;
  if (p.startsWith("8") && p.replace(/\D/g,"").length === 11)
    return "+7" + p.replace(/\D/g,"").slice(1);
  if (p.replace(/\D/g,"").length === 11) return "+" + p.replace(/\D/g,"");
  return p;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

function _plural(n, one, few, many) {
  const m10 = n%10, m100 = n%100;
  if (m10===1 && m100!==11) return one;
  if (m10>=2 && m10<=4 && !(m100>=12 && m100<=14)) return few;
  return many;
}

// ─── List view ────────────────────────────────────────────────────────────────
let _listData = [];
let _listFilter = "all";
let _listQuery = "";
let _listMonth = "";

async function loadList() {
  const cards = document.getElementById("listCards");
  try {
    _listData = await apiFetch("GET", "/api/bookings");
    populateMonthPills();
    renderList();
    // поисковый input
    const inp = document.getElementById("listSearch");
    inp.oninput = () => { _listQuery = inp.value.trim().toLowerCase(); renderList(); };
  } catch(e) {
    cards.innerHTML = `<div class="list-empty">Ошибка: ${escHtml(e.message)}</div>`;
  }
}

function setListFilter(f, btn) {
  _listFilter = f;
  document.querySelectorAll(".list-filter-btn").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  haptic.light();
  renderList();
}

function renderList() {
  let data = _listData;

  if (_listFilter === "future") data = data.filter(b => b.future);
  if (_listFilter === "past")   data = data.filter(b => !b.future);

  if (_listMonth) data = data.filter(b => b.date.slice(3, 10) === _listMonth);

  if (_listQuery) {
    data = data.filter(b =>
      (b.name  || "").toLowerCase().includes(_listQuery) ||
      (b.phone || "").toLowerCase().includes(_listQuery)
    );
  }

  const count = document.getElementById("listCount");
  count.textContent = data.length ? `${data.length} ${pluralBron(data.length)}` : "";

  const cards = document.getElementById("listCards");
  if (!data.length) {
    cards.innerHTML = '<div class="list-empty">Ничего не найдено</div>';
    return;
  }

  cards.innerHTML = data.map(b => {
    const future = b.future ? "future" : "";
    const rawPhone = b.phone || "";
    const normPhone = rawPhone ? formatPhone(rawPhone) : "";
    const phone = normPhone
      ? `<a href="tel:${escHtml(rawPhone)}">${escHtml(normPhone)}</a>`
      : '<span style="opacity:.5">Нет телефона</span>';
    const guests = b.guests ? `${escHtml(b.guests)} гост.` : "";
    const src = b.source
      ? `<span class="list-card-source">${escHtml(b.source)}</span>` : "";
    const comment = b.comment
      ? `<div class="list-card-row" style="margin-top:6px;font-size:12px;font-style:italic">${escHtml(b.comment)}</div>` : "";
    return `<div class="list-card ${future}">
      <div class="list-card-head">
        <div><span class="list-card-date">${escHtml(b.date)}</span><span class="list-card-weekday">${escHtml(b.weekday)}</span></div>
        <div class="list-card-guests">${guests}</div>
      </div>
      <div class="list-card-name">${escHtml(b.name || "—")}</div>
      <div class="list-card-row">${phone}</div>
      ${src}${comment}
    </div>`;
  }).join("");
}

function populateMonthPills() {
  const wrap = document.getElementById("listMonthPills");
  const months = new Set(_listData.map(b => b.date.slice(3, 10)));
  const sorted = [...months].sort((a, b) => {
    const [ma, ya] = a.split(".").map(Number);
    const [mb, yb] = b.split(".").map(Number);
    return ya !== yb ? ya - yb : ma - mb;
  });
  const RU_MONTHS = ["янв","фев","мар","апр","май","июн","июл","авг","сен","окт","ноя","дек"];
  const pills = [{ key: "", label: "Все" }, ...sorted.map(mk => {
    const [m, y] = mk.split(".").map(Number);
    return { key: mk, label: RU_MONTHS[m-1] + " " + String(y).slice(2) };
  })];
  wrap.innerHTML = pills.map(p =>
    `<button class="list-month-pill${_listMonth === p.key ? " active" : ""}"
      onclick="setListMonth(${JSON.stringify(p.key)},this)">${p.label}</button>`
  ).join("");
}

function setListMonth(key, btn) {
  _listMonth = key;
  document.querySelectorAll(".list-month-pill").forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  haptic.light();
  renderList();
}

function formatPhone(p) {
  const d = p.replace(/\D/g, "");
  if (d.length === 11 && (d[0] === "7" || d[0] === "8"))
    return `+7 (${d.slice(1,4)}) ${d.slice(4,7)}-${d.slice(7,9)}-${d.slice(9,11)}`;
  if (d.length === 10)
    return `+7 (${d.slice(0,3)}) ${d.slice(3,6)}-${d.slice(6,8)}-${d.slice(8,10)}`;
  return p;
}

function pluralBron(n) {
  const mod10 = n % 10, mod100 = n % 100;
  if (mod10 === 1 && mod100 !== 11) return "бронь";
  if (mod10 >= 2 && mod10 <= 4 && (mod100 < 10 || mod100 >= 20)) return "брони";
  return "броней";
}
