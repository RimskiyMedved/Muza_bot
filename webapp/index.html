<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Муза</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    :root {
      --bg:       var(--tg-theme-bg-color,            #FFFFFF);
      --bg2:      var(--tg-theme-secondary-bg-color,  #F5F5F7);
      --text:     var(--tg-theme-text-color,          #1C1C1E);
      --hint:     var(--tg-theme-hint-color,          #8E8E93);
      --btn:      var(--tg-theme-button-color,        #2481cc);
      --btn-text: var(--tg-theme-button-text-color,   #FFFFFF);

      --c-booked:  #E5534B;
      --c-free:    #30D158;
      --bg-booked: rgba(229,83,75,.09);
      --bg-free:   rgba(48,209,88,.09);
      --bg-today:  rgba(36,129,204,.10);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding-bottom: 64px;
      -webkit-font-smoothing: antialiased;
      overscroll-behavior: none;
    }

    /* ── Loading ──────────────────────────────────────────────────── */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg); z-index: 200;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
    }
    .loading-overlay.hidden { display: none; }
    .spinner {
      width: 28px; height: 28px;
      border: 2.5px solid var(--bg2); border-top-color: var(--btn);
      border-radius: 50%; animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: var(--hint); }

    /* ── Header ──────────────────────────────────────────────────── */
    .header {
      position: sticky; top: 0; z-index: 10;
      background: var(--bg);
      padding: 10px 16px 8px;
      border-bottom: 1px solid rgba(0,0,0,.05);
    }
    .year-row {
      display: flex; align-items: center; justify-content: center;
      gap: 8px; margin-bottom: 6px;
    }
    .year-nav {
      background: none; border: none; font-size: 17px;
      cursor: pointer; color: var(--hint); padding: 4px 8px;
      border-radius: 8px;
    }
    .year-nav:active { background: var(--bg2); }
    .year-label { font-size: 12px; font-weight: 600; color: var(--hint); letter-spacing: .4px; }
    .sync-btn {
      background: none; border: none;
      cursor: pointer; color: var(--hint); padding: 4px 6px; border-radius: 8px;
      display: flex; align-items: center;
    }
    .sync-btn.spinning svg { animation: spin .8s linear infinite; }
    .month-row {
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-btn {
      background: var(--bg2); border: none; border-radius: 10px;
      padding: 6px 18px; font-size: 17px; cursor: pointer; color: var(--text);
    }
    .nav-btn:active { opacity: .6; }
    .month-title { font-size: 18px; font-weight: 700; }

    /* ── Legend ──────────────────────────────────────────────────── */
    .legend {
      display: flex; gap: 14px; padding: 8px 14px 2px;
      font-size: 11px; color: var(--hint);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

    /* ── Weekdays ─────────────────────────────────────────────────── */
    .weekdays {
      display: grid; grid-template-columns: repeat(7, 1fr);
      padding: 2px clamp(5px,2vw,12px) 0;
    }
    .weekday-label {
      text-align: center; font-size: clamp(9px,2.5vw,11px);
      color: var(--hint); padding: 3px 0; font-weight: 600; letter-spacing: .2px;
    }
    .weekday-label.wknd { color: var(--c-booked); opacity: .7; }

    /* ── Calendar grid ─────────────────────────────────────────────── */
    .calendar-grid {
      display: grid; grid-template-columns: repeat(7, 1fr);
      gap: clamp(3px,.9vw,5px);
      padding: 4px clamp(5px,2vw,12px) 6px;
    }
    .day-cell {
      aspect-ratio: 1; border-radius: clamp(10px,3vw,16px);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      cursor: pointer; position: relative;
      transition: transform .12s, opacity .12s;
      user-select: none;
      background: var(--bg2);
    }
    .day-cell:active:not(.empty) { transform: scale(.84); }
    .day-cell.empty   { cursor: default; pointer-events: none; background: transparent; }
    .day-cell.booked  { background: var(--bg-booked); }
    .day-cell.free    { background: var(--bg-free); }
    .day-cell.past    { opacity: .32; }
    .day-cell.today   { box-shadow: 0 0 0 2px var(--btn); }
    .day-cell.wknd-col .day-number { color: var(--c-booked); }

    .day-number {
      font-size: clamp(12px,3.6vw,16px); font-weight: 600; line-height: 1;
    }
    .day-cell.booked  .day-number { color: var(--c-booked); }
    .day-cell.free    .day-number { color: var(--c-free); }
    .day-cell.today   .day-number { color: var(--btn); }

    /* Status dot — only for neutral/booked-no-name cells */
    .status-dot {
      width: 4px; height: 4px; border-radius: 50%; margin-top: 3px;
    }
    .day-cell.booked  .status-dot { background: var(--c-booked); }
    .day-cell.neutral .status-dot { background: transparent; }

    .day-name {
      font-size: clamp(6px,1.7vw,8px); margin-top: 1px;
      max-width: 90%; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; text-align: center; line-height: 1.1; font-weight: 600;
    }
    .day-cell.booked .day-name { color: var(--c-booked); opacity: .9; }
    .day-cell.free   .day-name { color: var(--c-free);   opacity: .9; }

    /* Source badge */
    .src-badge {
      position: absolute; top: 3px; right: 4px;
      font-size: clamp(5px,1.3vw,7px); font-weight: 800;
      color: var(--c-booked); opacity: .6; line-height: 1;
      letter-spacing: -.3px;
    }

    /* ── Mini stats ────────────────────────────────────────────────── */
    .cal-mini-stats {
      padding: 4px 14px 12px;
      display: flex; flex-wrap: wrap; gap: 5px; align-items: center;
    }
    .cal-mini-total { font-size: 12px; font-weight: 600; color: var(--text); }
    .cal-mini-chip {
      background: var(--bg2); border-radius: 100px;
      padding: 3px 10px; font-size: 11px; color: var(--hint); font-weight: 500;
    }

    /* ── FAB ──────────────────────────────────────────────────────── */
    .fab {
      position: fixed; bottom: 74px; right: 16px;
      background: var(--btn); color: var(--btn-text);
      border: none; border-radius: 50%;
      width: 52px; height: 52px;
      cursor: pointer;
      box-shadow: 0 2px 14px rgba(36,129,204,.28);
      z-index: 20; display: flex; align-items: center; justify-content: center;
      transition: transform .12s;
    }
    .fab:active { transform: scale(.88); }

    /* ── Stats ─────────────────────────────────────────────────────── */
    #statsView { display: none; }

    .stats-month-nav {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 8px;
      border-bottom: 1px solid rgba(0,0,0,.05);
      position: sticky; top: 0; background: var(--bg); z-index: 5;
    }
    .stats-nav-btn {
      background: var(--bg2); border: none; border-radius: 10px;
      padding: 6px 18px; font-size: 17px; cursor: pointer; color: var(--text);
    }
    .stats-nav-btn:active { opacity: .6; }
    .stats-month-title { font-size: 16px; font-weight: 700; text-align: center; }
    .stats-all-btn {
      background: none; border: none; font-size: 13px; font-weight: 600;
      color: var(--hint); cursor: pointer; padding: 6px 8px;
      border-radius: 8px; white-space: nowrap;
    }
    .stats-all-btn.active { color: var(--btn); }
    .stats-all-btn:active { opacity: .6; }

    .stats-body { padding: 14px; }

    /* Bento grid */
    .stats-bento {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px; margin-bottom: 6px;
    }
    .stat-card {
      background: var(--bg2); border-radius: 18px;
      padding: 16px 14px;
    }
    .stat-card.stat-wide {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: space-between;
    }
    .stat-number {
      font-size: 32px; font-weight: 800; line-height: 1;
      color: var(--text); letter-spacing: -.5px;
    }
    .stat-card.stat-wide .stat-number { font-size: 42px; }
    .stat-label  {
      font-size: 12px; font-weight: 500;
      color: var(--hint); margin-bottom: 6px; line-height: 1.3;
    }
    .stat-wide-badges {
      display: flex; flex-direction: column; gap: 6px; align-items: flex-end;
    }
    .stat-pill {
      background: rgba(36,129,204,.12); color: var(--btn);
      font-size: 12px; font-weight: 600;
      padding: 4px 10px; border-radius: 100px;
    }

    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin: 22px 0 10px;
    }
    .stats-section-title {
      font-size: 12px; font-weight: 700; color: var(--hint);
      text-transform: uppercase; letter-spacing: .6px;
    }

    /* Filter pill */
    .filter-pill {
      display: flex; align-items: center; gap: 5px;
      background: var(--bg2); border: none; border-radius: 100px;
      padding: 5px 12px; font-size: 12px; color: var(--text);
      cursor: pointer; font-family: inherit; font-weight: 500;
    }
    .filter-pill:active { opacity: .7; }
    .filter-pill.active { background: var(--btn); color: var(--btn-text); }
    .filter-pill-badge {
      background: rgba(255,255,255,.28); border-radius: 8px;
      padding: 1px 5px; font-size: 10px; font-weight: 700;
    }

    /* Month chart — pill bars */
    .month-chart {
      display: flex; align-items: flex-end; gap: 4px;
      overflow-x: auto; padding-bottom: 6px;
      scrollbar-width: none;
    }
    .month-chart::-webkit-scrollbar { display: none; }
    .month-bar-wrap {
      display: flex; flex-direction: column; align-items: center;
      gap: 4px; min-width: 32px; flex-shrink: 0;
      cursor: pointer; padding: 0 1px;
    }
    .month-bar-wrap:active { opacity: .7; }
    .month-bar-inner { height: 70px; width: 100%; display: flex; flex-direction: column; justify-content: flex-end; }
    .month-bar {
      width: 100%; background: var(--bg2);
      border-radius: 100px;
      transition: height .3s, background .2s; min-height: 4px;
    }
    .month-bar.has-data { background: var(--btn); opacity: .55; }
    .month-bar-wrap.active .month-bar { background: var(--c-booked) !important; opacity: 1; }
    .month-val {
      font-size: 10px; font-weight: 700; color: var(--hint);
      min-height: 13px; text-align: center; line-height: 1;
    }
    .month-bar-wrap.active .month-val   { color: var(--c-booked); }
    .month-bar-wrap.active .month-label { color: var(--btn); font-weight: 600; }
    .month-label-line1 { font-size: 9px; color: var(--hint); text-align: center; line-height: 1.2; font-weight: 500; }
    .month-label-line2 { font-size: 8px; color: var(--hint); opacity: .6; text-align: center; line-height: 1; }

    /* Source rows */
    .source-row {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 0; cursor: pointer;
    }
    .source-row + .source-row { border-top: 1px solid rgba(0,0,0,.04); }
    .source-row-active { background: rgba(36,129,204,.05); border-radius: 12px; padding: 10px 8px; margin: 0 -8px; }
    .source-name  { font-size: 14px; flex: 1; font-weight: 500; }
    .source-count { font-size: 15px; font-weight: 700; color: var(--btn); min-width: 26px; text-align: right; }
    .source-bar-wrap { width: 56px; height: 3px; background: var(--bg2); border-radius: 100px; overflow: hidden; }
    .source-bar {
      height: 100%; background: var(--btn); border-radius: 100px;
      opacity: .7; transition: width .4s;
    }

    .stats-loading {
      display: flex; align-items: center; justify-content: center;
      gap: 10px; padding: 40px; color: var(--hint); font-size: 14px;
    }
    .small-spinner {
      width: 18px; height: 18px; border: 2px solid var(--bg2); border-top-color: var(--btn);
      border-radius: 50%; animation: spin .7s linear infinite;
    }

    /* ── Bottom nav ───────────────────────────────────────────────── */
    .bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-top: 1px solid rgba(0,0,0,.06);
      display: flex; height: 62px; z-index: 30;
    }
    .nav-tab {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px; background: none; border: none;
      cursor: pointer; color: var(--hint);
      font-size: 10px; font-weight: 500; transition: color .15s;
    }
    .nav-tab svg { width: 22px; height: 22px; }
    .nav-tab.active { color: var(--btn); }

    /* ── Sheet / overlay ──────────────────────────────────────────── */
    .sheet-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,.35);
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity .22s; backdrop-filter: blur(4px);
    }
    .sheet-overlay.visible { opacity: 1; pointer-events: auto; }
    .sheet {
      position: fixed; bottom: 0; left: 0; right: 0;
      background: var(--bg); border-radius: 22px 22px 0 0;
      z-index: 50; transform: translateY(100%);
      transition: transform .28s cubic-bezier(.4,0,.2,1);
      max-height: 92vh; overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sheet.visible { transform: translateY(0); }
    .sheet-handle {
      width: 36px; height: 4px; background: rgba(0,0,0,.12);
      border-radius: 100px; margin: 10px auto 0;
    }
    .sheet-header {
      padding: 12px 16px 0;
      display: flex; align-items: flex-start; justify-content: space-between;
    }
    .sheet-title { font-size: 18px; font-weight: 700; }
    .sheet-date  { font-size: 13px; color: var(--hint); margin-top: 3px; }
    .close-btn {
      background: var(--bg2); border: none; border-radius: 50%;
      width: 30px; height: 30px; font-size: 15px;
      cursor: pointer; color: var(--hint); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:active { opacity: .6; }

    /* ── Booking detail ───────────────────────────────────────────── */
    .booking-detail { padding: 12px 16px 4px; }
    .detail-card {
      background: var(--bg2); border-radius: 16px; overflow: hidden;
    }
    .detail-row {
      display: flex; align-items: flex-start;
      padding: 11px 14px; gap: 12px;
    }
    .detail-row + .detail-row { border-top: 1px solid rgba(0,0,0,.04); }
    .detail-label { font-size: 13px; color: var(--hint); min-width: 88px; flex-shrink: 0; padding-top: 1px; font-weight: 500; }
    .detail-value { font-size: 14px; font-weight: 600; word-break: break-word; flex: 1; }

    /* ── Form ──────────────────────────────────────────────────────── */
    .form-body { padding: 12px 16px 4px; display: flex; flex-direction: column; gap: 12px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-label { font-size: 12px; color: var(--hint); font-weight: 600; letter-spacing: .2px; }
    .form-input {
      background: var(--bg2); border: 1.5px solid transparent;
      border-radius: 13px; padding: 12px 14px;
      font-size: 15px; color: var(--text); width: 100%;
      outline: none; transition: border-color .15s; font-family: inherit;
      -webkit-appearance: none;
    }
    .form-input:focus { border-color: var(--btn); background: var(--bg); }
    .form-textarea {
      background: var(--bg2); border: 1.5px solid transparent;
      border-radius: 13px; padding: 12px 14px;
      font-size: 15px; color: var(--text); width: 100%;
      outline: none; resize: none; min-height: 72px;
      transition: border-color .15s; font-family: inherit;
    }
    .form-textarea:focus { border-color: var(--btn); background: var(--bg); }

    /* Stepper */
    .stepper {
      display: flex; align-items: center;
      background: var(--bg2); border-radius: 13px;
      border: 1.5px solid transparent;
    }
    .step-btn {
      width: 48px; height: 48px; background: none; border: none;
      font-size: 22px; color: var(--btn);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border-radius: 13px; font-weight: 300;
    }
    .step-btn:active { background: rgba(0,0,0,.06); }
    .step-input {
      flex: 1; background: none; border: none; outline: none;
      text-align: center; font-size: 17px; font-weight: 700;
      color: var(--text); font-family: inherit;
      -webkit-appearance: none; appearance: none;
      min-width: 0; padding: 0;
    }
    .step-input::-webkit-inner-spin-button,
    .step-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .section-sep {
      font-size: 11px; font-weight: 700; color: var(--hint);
      text-transform: uppercase; letter-spacing: .6px; padding-top: 2px;
    }

    /* Source chip selector */
    .chip-selector { display: flex; flex-wrap: wrap; gap: 7px; }
    .chip-option {
      padding: 7px 14px; border-radius: 100px; font-size: 13px;
      border: 1.5px solid var(--bg2); background: var(--bg);
      color: var(--text); cursor: pointer;
      transition: all .15s; user-select: none; font-weight: 500;
    }
    .chip-option.selected {
      background: var(--btn); color: var(--btn-text); border-color: var(--btn);
    }
    .chip-option:active { opacity: .7; }
    .chip-custom-wrap { margin-top: 8px; display: none; }
    .chip-custom-input {
      background: var(--bg2); border: 1.5px solid var(--btn);
      border-radius: 13px; padding: 12px 14px;
      font-size: 15px; color: var(--text); width: 100%;
      outline: none; font-family: inherit;
    }

    /* ── Actions ───────────────────────────────────────────────────── */
    .actions { padding: 12px 16px 28px; display: flex; flex-direction: column; gap: 8px; }
    .btn {
      border: none; border-radius: 14px; padding: 14px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      width: 100%; transition: opacity .15s; font-family: inherit;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .btn:active { opacity: .72; }
    .btn:disabled { opacity: .4; }
    .btn-primary        { background: var(--btn); color: var(--btn-text); }
    .btn-secondary      { background: var(--bg2); color: var(--text); }
    .btn-danger         { background: var(--bg-booked); color: var(--c-booked); }
    .btn-outline-danger {
      background: transparent; color: var(--c-booked);
      border: 1.5px solid rgba(229,83,75,.25);
    }

    /* ── Source filter sheet ──────────────────────────────────────── */
    .filter-sheet-list { padding: 8px 16px 32px; }
    .filter-sheet-item {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid rgba(0,0,0,.05); cursor: pointer;
    }
    .filter-sheet-item:last-child { border-bottom: none; }
    .filter-radio {
      width: 20px; height: 20px; border-radius: 50%;
      border: 2px solid var(--bg2); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .filter-radio.checked { background: var(--btn); border-color: var(--btn); }
    .filter-radio.checked::after {
      content: ""; width: 7px; height: 7px;
      background: white; border-radius: 50%;
    }
    .filter-item-name { font-size: 14px; flex: 1; font-weight: 500; }
    .filter-item-cnt  { font-size: 13px; color: var(--hint); font-weight: 600; }

    /* ── Admin panel ────────────────────────────────────────────────── */
    #adminView { padding: 14px 16px 32px; display: none; }
    .admin-section {
      background: var(--bg2); border-radius: 18px; padding: 16px;
      margin-bottom: 12px;
    }
    .admin-section-title {
      font-size: 11px; font-weight: 700; color: var(--hint);
      text-transform: uppercase; letter-spacing: .6px; margin-bottom: 12px;
    }
    .admin-users-list { display: flex; flex-direction: column; gap: 8px; }
    .admin-user-row {
      display: flex; align-items: center; gap: 10px;
      background: var(--bg); border-radius: 12px; padding: 10px 12px;
    }
    .admin-user-name { flex: 1; font-size: 14px; font-weight: 600; }
    .admin-user-id   { font-size: 11px; color: var(--hint); margin-top: 2px; }
    .admin-remove-btn {
      background: none; border: none; color: var(--c-booked);
      cursor: pointer; padding: 4px; border-radius: 8px; line-height: 1;
      opacity: .7; display: flex; align-items: center;
    }
    .admin-remove-btn:active { opacity: .4; }
    .admin-textarea {
      width: 100%; background: var(--bg); border: 1.5px solid transparent;
      border-radius: 13px; padding: 12px 14px; font-size: 14px;
      color: var(--text); font-family: inherit; resize: none; outline: none;
      min-height: 80px; transition: border-color .15s;
    }
    .admin-textarea:focus { border-color: var(--btn); }
    .admin-add-btn {
      margin-top: 8px; width: 100%; padding: 13px;
      background: var(--btn); color: var(--btn-text);
      border: none; border-radius: 13px; font-size: 15px;
      font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .admin-add-btn:active { opacity: .8; }
    .admin-log-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .admin-log-table th {
      text-align: left; color: var(--hint); font-weight: 700;
      padding: 4px 6px 8px; border-bottom: 1px solid rgba(0,0,0,.06);
    }
    .admin-log-table td {
      padding: 7px 6px; border-bottom: 1px solid rgba(0,0,0,.04);
      vertical-align: top;
    }
    .admin-empty { text-align: center; color: var(--hint); font-size: 13px; padding: 12px; }

    /* ── Toast ──────────────────────────────────────────────────────── */
    .toast {
      position: fixed; bottom: 74px; left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(28,28,30,.9); color: #fff;
      padding: 9px 18px; border-radius: 100px;
      font-size: 13px; font-weight: 500; z-index: 300;
      opacity: 0; transition: opacity .2s, transform .2s;
      pointer-events: none; white-space: nowrap;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<div id="statsView">

<!-- FAB -->

<div class="sheet" id="sheet">

<nav class="bottom-nav" id="bottomNav">

      <rect x="3" y="4" width="18" height="18" rx="3"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>

  </button>

      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/>
    </svg>
    Статистика

    </svg>
    Админ
  </button>
</nav>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ─── Telegram WebApp ──────────────────────────────────────────────────────────
const twa = window.Telegram?.WebApp;
if (twa) { twa.ready(); twa.expand(); }
const initData = twa?.initData || "";

// Haptic helpers
const haptic = {
  light:   () => twa?.HapticFeedback?.impactOccurred("light"),
  medium:  () => twa?.HapticFeedback?.impactOccurred("medium"),
  success: () => twa?.HapticFeedback?.notificationOccurred("success"),
  error:   () => twa?.HapticFeedback?.notificationOccurred("error"),
  select:  () => twa?.HapticFeedback?.selectionChanged(),
};

// MainButton helpers
let _mbCb = null;
function showMainBtn(text, cb) {
  if (!twa?.MainButton) return;
  if (_mbCb) twa.MainButton.offClick(_mbCb);
  _mbCb = cb;
  twa.MainButton.setText(text);
  twa.MainButton.onClick(_mbCb);
  twa.MainButton.show();
}
function hideMainBtn() {
  if (!twa?.MainButton) return;
  if (_mbCb) { twa.MainButton.offClick(_mbCb); _mbCb = null; }
  twa.MainButton.hide();
}

// BackButton helpers
let _bbCb = null;
function showBackBtn(cb) {
  if (!twa?.BackButton) return;
  if (_bbCb) twa.BackButton.offClick(_bbCb);
  _bbCb = cb;
  twa.BackButton.onClick(_bbCb);
  twa.BackButton.show();
}
function hideBackBtn() {
  if (!twa?.BackButton) return;
  if (_bbCb) { twa.BackButton.offClick(_bbCb); _bbCb = null; }
  twa.BackButton.hide();
}

// ─── SVG Icons ────────────────────────────────────────────────────────────────
const ICO = {
  pencil: `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`,
  trash:  `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`,
  save:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>`,
  back:   `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>`,
  warn:   `<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>`,
};

// ─── State ────────────────────────────────────────────────────────────────────
let currentView = "calendar";
let currentYear = new Date().getFullYear();
let currentMon  = new Date().getMonth() + 1;
let calData     = null;
let sourcesData   = [];
let _activeSource = "";   // фильтр по источнику в статистике
let _allSources   = {};
let _formSource   = "";

// ─── Weekday header ───────────────────────────────────────────────────────────
const WD = ["Пн","Вт","Ср","Чт","Пт","Сб","Вс"];
const wdHeader = document.getElementById("weekdayHeader");
WD.forEach((d, i) => {
  const el = document.createElement("div");
  el.className = "weekday-label" + (i >= 4 ? " wknd" : "");
  el.textContent = d;
  wdHeader.appendChild(el);
});

// ─── API ──────────────────────────────────────────────────────────────────────
const API = window.location.origin;
async function apiFetch(method, path, body) {
  const opts = {
    method,
    headers: { "Content-Type": "application/json", "X-Init-Data": initData },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

// ─── Navigation ───────────────────────────────────────────────────────────────
function switchView(view) {
  currentView = view;
  document.getElementById("calendarView").style.display  = view === "calendar" ? "block" : "none";
  document.getElementById("statsView").style.display     = view === "stats"    ? "block" : "none";
  document.getElementById("adminView").style.display     = view === "admin"    ? "block" : "none";
  document.getElementById("calHeader").style.display     = view === "calendar" ? "block" : "none";
  document.getElementById("fabBtn").style.display        = view === "calendar" ? "flex"  : "none";
  document.querySelectorAll(".nav-tab").forEach(t => t.classList.remove("active"));
  const tabEl = document.getElementById(`tab-${view}`);
  if (tabEl) tabEl.classList.add("active");
  haptic.select();
  if (view === "stats") loadStats();
  if (view === "admin") loadAdminPanel();
}

// ─── Year / month ──────────────────────────────────────────────────────────────
document.getElementById("prevYearBtn").addEventListener("click", () => { haptic.light(); currentYear--; loadMonth(); });
document.getElementById("nextYearBtn").addEventListener("click", () => { haptic.light(); currentYear++; loadMonth(); });
document.getElementById("prevBtn").addEventListener("click", () => {
  haptic.light();
  if (currentMon === 1) { currentMon = 12; currentYear--; } else currentMon--;
  loadMonth();
});
document.getElementById("nextBtn").addEventListener("click", () => {
  haptic.light();
  if (currentMon === 12) { currentMon = 1; currentYear++; } else currentMon++;
  loadMonth();
});

// ─── Sync ─────────────────────────────────────────────────────────────────────
document.getElementById("syncBtn").addEventListener("click", async () => {
  haptic.light();
  const btn = document.getElementById("syncBtn");
  btn.classList.add("spinning");
  try {
    await apiFetch("POST", "/api/sync");
    await loadMonth();
    haptic.success();
    showToast("Данные обновлены");
  } catch (e) {
    haptic.error();
    showToast("Ошибка: " + e.message);
  } finally {
    btn.classList.remove("spinning");
  }
});

// ─── Load month ───────────────────────────────────────────────────────────────
async function loadMonth() {
  const month = `${currentYear}-${String(currentMon).padStart(2,"0")}`;
  try {
    calData = await apiFetch("GET", `/api/calendar?month=${month}`);
    renderCalendar();
  } catch (e) {
    showToast("Ошибка загрузки: " + e.message);
  }
}

// ─── Render calendar ──────────────────────────────────────────────────────────
function renderCalendar() {
  document.getElementById("yearLabel").textContent  = calData.year;
  document.getElementById("monthTitle").textContent = calData.month_name;

  const grid = document.getElementById("calendarGrid");
  grid.innerHTML = "";

  for (let i = 0; i < calData.first_weekday; i++) {
    const blank = document.createElement("div");
    blank.className = "day-cell empty";
    grid.appendChild(blank);
  }

  calData.days.forEach(day => {
    const cell = document.createElement("div");
    const cls  = ["day-cell", day.status];
    if (day.past)  cls.push("past");
    if (day.today) cls.push("today");
    const wd = new Date(
      parseInt(day.date.slice(6)), parseInt(day.date.slice(3,5))-1, parseInt(day.date.slice(0,2))
    ).getDay();
    if (wd === 0 || wd === 5 || wd === 6) cls.push("wknd-col");
    cell.className = cls.join(" ");

    const num = document.createElement("div");
    num.className   = "day-number";
    num.textContent = day.day;
    cell.appendChild(num);

    // Status dot — only for neutral cells (no dot for free or booked-with-name)
    if (day.status !== "free" && !(day.status === "booked" && day.name)) {
      const dot = document.createElement("div");
      dot.className = "status-dot";
      cell.appendChild(dot);
    }

    // Name inside cell
    if (day.status === "booked" && day.name) {
      const nm = document.createElement("div");
      nm.className   = "day-name";
      nm.textContent = day.name.split(" ")[0];
      cell.appendChild(nm);
    } else if (day.status === "free") {
      const nm = document.createElement("div");
      nm.className   = "day-name";
      nm.textContent = "Своб.";
      cell.appendChild(nm);
    }

    // Source badge (booked only)
    if (day.status === "booked" && day.source) {
      const badge = document.createElement("div");
      badge.className   = "src-badge";
      badge.textContent = day.source.replace(/\s+/g, "").slice(0, 2);
      cell.appendChild(badge);
    }

    cell.addEventListener("click", () => {
      haptic.light();
      onDayClick(day);
    });
    grid.appendChild(cell);
  });

  document.getElementById("loadingOverlay").classList.add("hidden");
  renderMiniStats();
}

// ─── Mini stats ───────────────────────────────────────────────────────────────
function renderMiniStats() {
  const el = document.getElementById("calMiniStats");
  if (!el || !calData) return;
  const booked = calData.days.filter(d => d.status === "booked");
  if (booked.length === 0) {
    el.innerHTML = '<span class="cal-mini-total" style="color:var(--hint)">Броней нет</span>';
    return;
  }
  const srcMap = {};
  booked.forEach(d => { const s = d.source || "—"; srcMap[s] = (srcMap[s]||0)+1; });
  const n    = booked.length;
  const word = _plural(n, "бронь", "брони", "броней");
  const chips = Object.entries(srcMap).sort((a,b)=>b[1]-a[1])
    .map(([s,c]) => `<span class="cal-mini-chip">${escHtml(s.length>13?s.slice(0,13)+"…":s)}: ${c}</span>`)
    .join("");
  el.innerHTML = `<span class="cal-mini-total">${n} ${word}</span>${chips}`;
}

// ─── Stats state ──────────────────────────────────────────────────────────────
const MONTH_NAMES_RU = ["Январь","Февраль","Март","Апрель","Май","Июнь",
                        "Июль","Август","Сентябрь","Октябрь","Ноябрь","Декабрь"];
let statsYear    = new Date().getFullYear();
let statsMon     = new Date().getMonth() + 1;
let statsAllMode = true;   // true = все время, false = конкретный месяц

function _statsMonthKey() {
  return statsAllMode ? "" : `${String(statsMon).padStart(2,"0")}.${statsYear}`;
}

function _updateStatsNav() {
  const titleEl  = document.getElementById("statsMonthTitle");
  const allBtn   = document.getElementById("statsAllBtn");
  if (!titleEl) return;
  if (statsAllMode) {
    titleEl.textContent = "Все время";
    if (allBtn) allBtn.classList.add("active");
  } else {
    titleEl.textContent = MONTH_NAMES_RU[statsMon-1] + " " + statsYear;
    if (allBtn) allBtn.classList.remove("active");
  }
}

function statsShowAll() {
  haptic.select();
  statsAllMode = true;
  _activeSource = "";
  _updateStatsNav();
  loadStats();
}

document.getElementById("statsPrevBtn").addEventListener("click", () => {
  haptic.light();
  statsAllMode = false;
  if (statsMon === 1) { statsMon = 12; statsYear--; } else statsMon--;
  _activeSource = "";
  _updateStatsNav();
  loadStats();
});
document.getElementById("statsNextBtn").addEventListener("click", () => {
  haptic.light();
  statsAllMode = false;
  if (statsMon === 12) { statsMon = 1; statsYear++; } else statsMon++;
  _activeSource = "";
  _updateStatsNav();
  loadStats();
});

// ─── Stats ────────────────────────────────────────────────────────────────────
async function loadStats() {
  const el = document.getElementById("statsContent");
  el.innerHTML = '<div class="stats-loading"><div class="small-spinner"></div>Загружаем…</div>';
  try {
    const params = new URLSearchParams();
    const monthKey = _statsMonthKey();
    if (monthKey)      params.set("month",  monthKey);
    if (_activeSource) params.set("source", _activeSource);
    const qs = params.toString() ? "?" + params.toString() : "";
    const s = await apiFetch("GET", "/api/stats" + qs);

    _allSources = s.by_source;

    // Month chart bars — clicking navigates to that month
    const keys = s.by_month.keys || [];
    const maxM = Math.max(1, ...s.by_month.counts);
    const monthBars = s.by_month.labels.map((lbl, i) => {
      const cnt    = s.by_month.counts[i];
      const key    = keys[i] || "";
      const active = !statsAllMode && _statsMonthKey() === key;
      const h      = Math.max(4, Math.round(cnt / maxM * 70));
      const parts  = lbl.split(" ");
      return `
        <div class="month-bar-wrap${active ? " active" : ""}"
             onclick="statsGoToMonth(${JSON.stringify(key)})">
          <div class="month-val">${cnt || ""}</div>
          <div class="month-bar-inner">
            <div class="month-bar${cnt > 0 ? " has-data" : ""}" style="height:${h}px"></div>
          </div>
          <div class="month-label-line1">${escHtml(parts[0]||lbl)}</div>
          <div class="month-label-line2">${escHtml(parts[1]||"")}</div>
        </div>`;
    }).join("");

    // Source rows — clicking toggles source filter
    const srcEntries = Object.entries(s.by_source);
    const maxSrc = Math.max(1, ...srcEntries.map(e => e[1]));
    const srcRows = srcEntries.length ? srcEntries.map(([src, cnt]) => {
      const active = _activeSource === src;
      return `
        <div class="source-row${active ? " source-row-active" : ""}"
             onclick="statsToggleSource(${JSON.stringify(src)})">
          <div class="source-name">${escHtml(src)}</div>
          <div class="source-bar-wrap">
            <div class="source-bar" style="width:${Math.round(cnt/maxSrc*100)}%"></div>
          </div>
          <div class="source-count">${cnt}</div>
          ${active ? `<div style="color:var(--hint);font-size:12px">✕</div>` : ""}
        </div>`;
    }).join("")
    : `<div style="text-align:center;color:var(--hint);padding:16px;font-size:14px">Нет данных</div>`;

    // Header label
    const monthLabel = !statsAllMode ? MONTH_NAMES_RU[statsMon-1] + " " + statsYear : "";
    const srcLabel   = _activeSource ? ` · ${_activeSource}` : "";
    const wideBadge  = statsAllMode
      ? `<span class="stat-pill">${s.future} впереди</span>`
      : "";

    el.innerHTML = `
      <div class="stats-bento">
        <div class="stat-card stat-wide">
          <div>
            <div class="stat-label">${monthLabel ? escHtml(monthLabel) : "Все время"}${srcLabel ? `<span style="color:var(--btn)"> · ${escHtml(_activeSource)}</span>` : ""}</div>
            <div class="stat-number">${s.total}</div>
          </div>
          ${wideBadge ? `<div class="stat-wide-badges">${wideBadge}</div>` : ""}
        </div>
        ${statsAllMode ? `
        <div class="stat-card">
          <div class="stat-label">${escHtml(s.this_month_name)}</div>
          <div class="stat-number">${s.this_month}</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">${escHtml(s.next_month_name)}</div>
          <div class="stat-number">${s.next_month}</div>
        </div>` : ""}
      </div>

      <div class="section-header">
        <div class="stats-section-title">По месяцам</div>
      </div>
      <div class="month-chart">${monthBars}</div>

      <div class="section-header" style="margin-top:22px">
        <div class="stats-section-title">По источникам</div>
        ${_activeSource ? `<button class="filter-pill active" onclick="statsToggleSource('')">Сбросить</button>` : ""}
      </div>
      ${srcRows}
    `;

    // Scroll active month bar into view
    if (!statsAllMode) {
      setTimeout(() => {
        const active = document.querySelector(".month-bar-wrap.active");
        if (active) active.scrollIntoView({ behavior:"smooth", block:"nearest", inline:"center" });
      }, 100);
    }
  } catch (e) {
    el.innerHTML = `<div class="stats-loading" style="color:var(--c-booked)">Ошибка: ${e.message}</div>`;
  }
}

function statsGoToMonth(key) {
  // key = "MM.YYYY"
  haptic.select();
  if (!key) return;
  const [mm, yyyy] = key.split(".");
  statsMon     = parseInt(mm);
  statsYear    = parseInt(yyyy);
  statsAllMode = false;
  _activeSource = "";
  _updateStatsNav();
  loadStats();
}

function statsToggleSource(src) {
  haptic.select();
  _activeSource = _activeSource === src ? "" : src;
  loadStats();
}

// ─── Day click ────────────────────────────────────────────────────────────────
function onDayClick(day) {
  if (day.status === "booked") openViewSheet(day);
  else openAddSheet(day);
}

// ─── View sheet ───────────────────────────────────────────────────────────────
function openViewSheet(day) {
  document.getElementById("sheetTitle").textContent = "Бронь";
  document.getElementById("sheetDate").textContent  = fmtDate(day.date);

  const fields = [
    ["Клиент",      day.name             ],
    ["Гости",       day.guests           ],
    ["Телефон",     fmtPhone(day.phone)  ],
    ["Источник",    day.source           ],
    ["Тип",         day.client_type      ],
    ["Комментарий", day.comment          ],
  ].filter(([, v]) => v);

  document.getElementById("sheetContent").innerHTML =
    `<div class="booking-detail">
      <div class="detail-card">
        ${fields.map(([l, v]) =>
          `<div class="detail-row">
            <div class="detail-label">${l}</div>
            <div class="detail-value">${escHtml(String(v))}</div>
          </div>`).join("")}
      </div>
    </div>`;

  const act = document.getElementById("sheetActions");
  act.innerHTML = "";

  const editBtn = document.createElement("button");
  editBtn.className = "btn btn-primary";
  editBtn.innerHTML = `${ICO.pencil} Редактировать`;
  editBtn.onclick = () => { haptic.light(); openEditSheet(day); };
  act.appendChild(editBtn);

  const delBtn = document.createElement("button");
  delBtn.className = "btn btn-outline-danger";
  delBtn.innerHTML = `${ICO.trash} Отменить бронь`;
  delBtn.onclick = () => { haptic.medium(); confirmDelete(day); };
  act.appendChild(delBtn);

  openSheet(null, null);
}

// ─── Add sheet ────────────────────────────────────────────────────────────────
function openAddSheet(day) {
  document.getElementById("sheetTitle").textContent = "Новая бронь";
  document.getElementById("sheetDate").textContent  = day ? fmtDate(day.date) : "";

  const data = { date: day?.date||"", guests:"", name:"", phone:"", source:"", client_type:"", comment:"" };
  document.getElementById("sheetContent").innerHTML = buildForm(data, !day);

  const act = document.getElementById("sheetActions");
  act.innerHTML = "";
  const saveBtn = document.createElement("button");
  saveBtn.className = "btn btn-primary";
  saveBtn.innerHTML = `${ICO.save} Сохранить`;
  saveBtn.onclick = () => submitAdd();
  act.appendChild(saveBtn);
  const cancelBtn = document.createElement("button");
  cancelBtn.className = "btn btn-secondary";
  cancelBtn.textContent = "Отмена";
  cancelBtn.onclick = closeSheet;
  act.appendChild(cancelBtn);

  openSheet("Сохранить", () => submitAdd());
  initFormWidgets(data);
}

// ─── Edit sheet ───────────────────────────────────────────────────────────────
function openEditSheet(day) {
  document.getElementById("sheetTitle").textContent = "Редактировать";
  document.getElementById("sheetDate").textContent  = fmtDate(day.date);
  document.getElementById("sheetContent").innerHTML = buildForm(day, false);

  const act = document.getElementById("sheetActions");
  act.innerHTML = "";
  const saveBtn = document.createElement("button");
  saveBtn.className = "btn btn-primary";
  saveBtn.innerHTML = `${ICO.save} Сохранить`;
  saveBtn.onclick = () => submitEdit(day.date);
  act.appendChild(saveBtn);
  const backBtn = document.createElement("button");
  backBtn.className = "btn btn-secondary";
  backBtn.innerHTML = `${ICO.back} Назад`;
  backBtn.onclick = () => { haptic.light(); openViewSheet(day); };
  act.appendChild(backBtn);

  openSheet("Сохранить", () => submitEdit(day.date));
  initFormWidgets(day);
}

// ─── Form build ───────────────────────────────────────────────────────────────
function buildForm(data, showDateField) {
  const dateF = showDateField
    ? `<div class="form-group">
        <label class="form-label">Дата</label>
        <input class="form-input" id="f-date" type="text"
               placeholder="ДД.ММ.ГГГГ" value="${escHtml(data.date||"")}" />
      </div>`
    : `<input type="hidden" id="f-date" value="${escHtml(data.date||"")}" />`;

  return `<div class="form-body">
    ${dateF}
    <div class="form-group">
      <label class="form-label">Имя клиента</label>
      <input class="form-input" id="f-name" type="text"
             placeholder="Иван Петров" value="${escHtml(data.name||"")}" />
    </div>
    <div class="form-group">
      <label class="form-label">Количество гостей</label>
      <div class="stepper">
        <button class="step-btn" type="button" onclick="stepGuests(-10)">−</button>
        <input class="step-input" id="f-guests" type="number" min="0" step="10"
               inputmode="numeric" placeholder="0"
               value="${escHtml(data.guests||"")}" />
        <button class="step-btn" type="button" onclick="stepGuests(10)">+</button>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Телефон</label>
      <input class="form-input" id="f-phone" type="tel"
             placeholder="+7 900 000 00 00"
             value="${escHtml(fmtPhone(data.phone||""))}" />
    </div>
    <div class="section-sep">Дополнительно</div>
    <div class="form-group">
      <label class="form-label">Источник рекламы</label>
      <div class="chip-selector" id="srcChips"></div>
      <div class="chip-custom-wrap" id="chipCustomWrap">
        <input class="chip-custom-input" id="f-source-custom"
               type="text" placeholder="Введите источник…" />
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Тип клиента</label>
      <input class="form-input" id="f-client_type" type="text"
             placeholder="Прямой клиент / Агентство"
             value="${escHtml(data.client_type||"")}" />
    </div>
    <div class="form-group">
      <label class="form-label">Комментарий</label>
      <textarea class="form-textarea" id="f-comment"
                placeholder="Пожелания, заметки…">${escHtml(data.comment||"")}</textarea>
    </div>
  </div>`;
}

// ─── Form widgets ─────────────────────────────────────────────────────────────
function initFormWidgets(data) {
  _formSource = data.source || "";
  renderChipSelector();
}

function stepGuests(delta) {
  haptic.select();
  const el = document.getElementById("f-guests");
  if (!el) return;
  const v = parseInt(el.value) || 0;
  el.value = Math.max(0, v + delta) || "";
}

function renderChipSelector() {
  const wrap = document.getElementById("srcChips");
  if (!wrap) return;

  const isCustom = _formSource && !sourcesData.includes(_formSource);
  const srcs = sourcesData.length ? [...sourcesData, "__other__"] : ["__other__"];

  wrap.innerHTML = srcs.map(s => {
    const lbl    = s === "__other__" ? "Другое…" : s;
    const active = (s === _formSource) || (s === "__other__" && isCustom);
    return `<div class="chip-option${active ? " selected" : ""}" data-src="${escHtml(s)}">${escHtml(lbl)}</div>`;
  }).join("");

  wrap.querySelectorAll(".chip-option").forEach(el => {
    el.addEventListener("click", () => {
      haptic.select();
      const src = el.dataset.src;
      wrap.querySelectorAll(".chip-option").forEach(c => c.classList.remove("selected"));
      el.classList.add("selected");
      const customWrap  = document.getElementById("chipCustomWrap");
      const customInput = document.getElementById("f-source-custom");
      if (src === "__other__") {
        if (customWrap)  customWrap.style.display  = "block";
        if (customInput) { customInput.focus(); _formSource = customInput.value || ""; }
        if (customInput) customInput.oninput = e => { _formSource = e.target.value; };
      } else {
        _formSource = src;
        if (customWrap)  customWrap.style.display  = "none";
        if (customInput) customInput.value = "";
      }
    });
  });

  const customWrap  = document.getElementById("chipCustomWrap");
  const customInput = document.getElementById("f-source-custom");
  if (isCustom && customWrap && customInput) {
    customWrap.style.display = "block";
    customInput.value = _formSource;
    customInput.oninput = e => { _formSource = e.target.value; };
  }
}

function getFormData() {
  const customWrap  = document.getElementById("chipCustomWrap");
  const customInput = document.getElementById("f-source-custom");
  const isCustom    = customWrap && customWrap.style.display !== "none";
  const finalSource = isCustom ? (customInput?.value?.trim() || _formSource) : _formSource;
  return {
    date:        document.getElementById("f-date")?.value.trim()        || "",
    name:        document.getElementById("f-name")?.value.trim()        || "",
    guests:      document.getElementById("f-guests")?.value.trim()      || "",
    phone:       document.getElementById("f-phone")?.value.trim()       || "",
    source:      finalSource,
    client_type: document.getElementById("f-client_type")?.value.trim() || "",
    comment:     document.getElementById("f-comment")?.value.trim()     || "",
  };
}

// ─── Submit ───────────────────────────────────────────────────────────────────
async function submitAdd() {
  const data = getFormData();
  if (!data.date) { haptic.error(); showToast("Укажите дату"); return; }
  if (!/^\d{2}\.\d{2}\.\d{4}$/.test(data.date)) { haptic.error(); showToast("Формат: ДД.ММ.ГГГГ"); return; }
  if (!data.name) { haptic.error(); showToast("Укажите имя клиента"); return; }
  try {
    setSheetLoading(true);
    await apiFetch("POST", "/api/booking", data);
    haptic.success();
    closeSheet(); showToast("Бронь добавлена");
    await loadMonth();
  } catch (e) { haptic.error(); showToast("Ошибка: " + e.message); }
  finally { setSheetLoading(false); }
}

async function submitEdit(dateStr) {
  const data = { ...getFormData(), date: dateStr };
  if (!data.name) { haptic.error(); showToast("Укажите имя клиента"); return; }
  try {
    setSheetLoading(true);
    await apiFetch("PUT", `/api/booking/${encodeURIComponent(dateStr)}`, data);
    haptic.success();
    closeSheet(); showToast("Бронь обновлена");
    await loadMonth();
  } catch (e) { haptic.error(); showToast("Ошибка: " + e.message); }
  finally { setSheetLoading(false); }
}

function confirmDelete(day) {
  document.getElementById("sheetContent").innerHTML = `
    <div style="padding:24px 16px;text-align:center">
      <div style="color:var(--c-booked);margin-bottom:12px">${ICO.warn}</div>
      <div style="font-size:17px;font-weight:700;margin-bottom:8px">Отменить бронь?</div>
      <div style="font-size:14px;color:var(--hint)">${fmtDate(day.date)}<br>${escHtml(day.name||"")}</div>
    </div>`;
  const act = document.getElementById("sheetActions");
  act.innerHTML = "";
  const confirmBtn = document.createElement("button");
  confirmBtn.className = "btn btn-danger";
  confirmBtn.innerHTML = `${ICO.trash} Да, отменить`;
  confirmBtn.onclick = () => doDelete(day);
  act.appendChild(confirmBtn);
  const backBtn = document.createElement("button");
  backBtn.className = "btn btn-secondary";
  backBtn.innerHTML = `${ICO.back} Назад`;
  backBtn.onclick = () => { haptic.light(); openViewSheet(day); };
  act.appendChild(backBtn);
}

async function doDelete(day) {
  try {
    setSheetLoading(true);
    await apiFetch("DELETE", `/api/booking/${encodeURIComponent(day.date)}`);
    haptic.success();
    closeSheet(); showToast("Бронь отменена");
    await loadMonth();
  } catch (e) { haptic.error(); showToast("Ошибка: " + e.message); }
  finally { setSheetLoading(false); }
}

// ─── FAB ──────────────────────────────────────────────────────────────────────
document.getElementById("fabBtn").addEventListener("click", () => {
  haptic.medium();
  openAddSheet(null);
});

// ─── Sheet helpers ────────────────────────────────────────────────────────────
function openSheet(mainText, mainCb) {
  document.getElementById("overlay").classList.add("visible");
  document.getElementById("sheet").classList.add("visible");
  showBackBtn(closeSheet);
  if (mainText && mainCb) showMainBtn(mainText, mainCb);
}
function closeSheet() {
  document.getElementById("overlay").classList.remove("visible");
  document.getElementById("sheet").classList.remove("visible");
  hideMainBtn();
  hideBackBtn();
}
function setSheetLoading(on) {
  document.querySelectorAll("#sheetActions .btn").forEach(b => { b.disabled = on; });
  if (twa?.MainButton) {
    on ? twa.MainButton.showProgress(false) : twa.MainButton.hideProgress();
  }
}
function addBtn(container, cls, text, onClick) {
  const b = document.createElement("button");
  b.className   = `btn ${cls}`;
  b.textContent = text;
  b.onclick     = onClick;
  container.appendChild(b);
}
document.getElementById("closeBtn").addEventListener("click", () => { haptic.light(); closeSheet(); });
document.getElementById("overlay").addEventListener("click", closeSheet);

// ─── Utils ────────────────────────────────────────────────────────────────────
function fmtDate(s) {
  try {
    const [d, m, y] = s.split(".").map(Number);
    return new Date(y, m-1, d).toLocaleDateString("ru-RU",
      { day:"numeric", month:"long", year:"numeric", weekday:"long" });
  } catch { return s; }
}

function fmtPhone(p) {
  if (!p) return "";
  p = p.trim();
  if (p.startsWith("+")) return p;
  if (p.startsWith("8") && p.replace(/\D/g,"").length === 11)
    return "+7" + p.replace(/\D/g,"").slice(1);
  if (p.replace(/\D/g,"").length === 11) return "+" + p.replace(/\D/g,"");
  return p;
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

let _toastTimer = null;
function showToast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.classList.add("show");
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => t.classList.remove("show"), 2800);
}

function _plural(n, one, few, many) {
  const m10 = n%10, m100 = n%100;
  if (m10===1 && m100!==11) return one;
  if (m10>=2 && m10<=4 && !(m100>=12 && m100<=14)) return few;
  return many;
}

// ─── Load sources ─────────────────────────────────────────────────────────────
async function loadSources() {
  try { sourcesData = await apiFetch("GET", "/api/sources"); }
  catch { /* не критично */ }
}

// ─── Superadmin check ─────────────────────────────────────────────────────────
const SUPERADMIN_ID = 45028744;
const myId = twa?.initDataUnsafe?.user?.id || 0;
if (myId === SUPERADMIN_ID) {
  document.getElementById("tab-admin").style.display = "";
}

// ─── Admin panel ──────────────────────────────────────────────────────────────
async function loadAdminUsers() {
  const list = document.getElementById("adminUsersList");
  try {
    const users = await apiFetch("GET", "/api/admin/users");
    if (!users.length) {
      list.innerHTML = '<div class="admin-empty">Нет пользователей</div>';
      return;
    }
    list.innerHTML = "";
    users.forEach(u => {
      const row = document.createElement("div");
      row.className = "admin-user-row";
      const hasId = u.telegram_id && u.telegram_id !== 0;
      row.innerHTML = `
        <div style="flex:1">
          <div class="admin-user-name">@${escHtml(u.username || "—")}</div>
          <div class="admin-user-id">${hasId ? "ID: " + u.telegram_id : "⏳ ещё не писал боту"} · ${escHtml(u.added_at || "")}</div>
        </div>
        <button class="admin-remove-btn" data-id="${u.telegram_id}" data-uname="${escHtml(u.username)}">
          ${ICO.trash}
        </button>
      `;
      list.appendChild(row);
    });
  } catch(e) {
    list.innerHTML = `<div class="admin-empty">Ошибка: ${escHtml(e.message)}</div>`;
  }
}

async function loadAdminActivity() {
  const wrap = document.getElementById("adminActivityContent");
  try {
    const rows = await apiFetch("GET", "/api/admin/activity");
    if (!rows.length) {
      wrap.innerHTML = '<div class="admin-empty">Пока нет активности</div>';
      return;
    }
    let html = '<table class="admin-log-table"><thead><tr><th>Пользователь</th><th>Действие</th><th>Время</th></tr></thead><tbody>';
    rows.forEach(r => {
      html += `<tr>
        <td>${r.username ? "@" + escHtml(r.username) : escHtml(String(r.telegram_id))}</td>
        <td>${escHtml(r.action || "")}</td>
        <td style="white-space:nowrap;color:var(--hint)">${escHtml(r.timestamp || "")}</td>
      </tr>`;
    });
    html += "</tbody></table>";
    wrap.innerHTML = html;
  } catch(e) {
    wrap.innerHTML = `<div class="admin-empty">Ошибка: ${escHtml(e.message)}</div>`;
  }
}

document.getElementById("adminUsersList").addEventListener("click", async e => {
  const btn = e.target.closest(".admin-remove-btn");
  if (!btn) return;
  const tid = parseInt(btn.dataset.id);
  const uname = btn.dataset.uname;
  if (!tid) {
    showToast("Нельзя удалить — пользователь ещё не писал боту");
    return;
  }
  haptic.medium();
  btn.disabled = true;
  try {
    await apiFetch("DELETE", `/api/admin/users/${tid}`);
    showToast(`@${uname} удалён`);
    haptic.success();
    loadAdminUsers();
  } catch(e) {
    haptic.error();
    showToast("Ошибка: " + e.message);
    btn.disabled = false;
  }
});

document.getElementById("adminAddBtn").addEventListener("click", async () => {
  const raw = document.getElementById("adminUsernamesInput").value.trim();
  if (!raw) return;
  const usernames = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);
  if (!usernames.length) return;
  haptic.medium();
  const btn = document.getElementById("adminAddBtn");
  btn.disabled = true;
  btn.textContent = "Добавляем…";
  try {
    const res = await apiFetch("POST", "/api/admin/users", { usernames });
    const added = res.added?.length || 0;
    const dupes = res.dupes?.length || 0;
    let msg = added ? `Добавлено: ${added}` : "";
    if (dupes) msg += (msg ? ", " : "") + `уже есть: ${dupes}`;
    showToast(msg || "Готово");
    haptic.success();
    document.getElementById("adminUsernamesInput").value = "";
    loadAdminUsers();
  } catch(e) {
    haptic.error();
    showToast("Ошибка: " + e.message);
  } finally {
    btn.disabled = false;
    btn.textContent = "Добавить";
  }
});

function loadAdminPanel() {
  loadAdminUsers();
  loadAdminActivity();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadMonth();
loadSources();
</script>
