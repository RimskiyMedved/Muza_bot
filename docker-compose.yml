# ─── Сеть ─────────────────────────────────────────────────────────────────────
networks:
  muza_net:
    driver: bridge

# ─── Тома для Caddy ───────────────────────────────────────────────────────────
volumes:
  caddy_data:     # сертификаты Let's Encrypt (сохраняются между перезапусками)
  caddy_config:   # внутренний конфиг Caddy

services:

  # ── Telegram-бот ────────────────────────────────────────────────────────────
  muza_bot:
    build: .
    command: python bot.py
    env_file: .env
    restart: unless-stopped
    networks: [muza_net]
    volumes:
      - ./database.db:/app/database.db
      - ./credentials.json:/app/credentials.json
      # bot_state.json удалён — состояние теперь в SQLite

  # ── FastAPI для Mini App ─────────────────────────────────────────────────────
  muza_api:
    build: .
    command: >
      uvicorn api:app
      --host 0.0.0.0
      --port 8001
      --reload
      --log-level info
    env_file: .env
    restart: unless-stopped
    networks: [muza_net]
    ports:
      - "8001:8001"   # нужен для ngrok (до появления домена + Caddy)
    volumes:
      - ./database.db:/app/database.db
      - ./credentials.json:/app/credentials.json
      - ./webapp:/app/webapp   # hot-reload: изменения без rebuild
      - ./api.py:/app/api.py   # hot-reload: изменения без rebuild
      - ./sheets.py:/app/sheets.py
      - ./database.py:/app/database.py

  # ── Caddy — HTTPS reverse proxy ──────────────────────────────────────────────
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    networks: [muza_net]
    ports:
      - "80:80"      # нужен для HTTP-challenge Let's Encrypt
      - "443:443"    # HTTPS
      - "443:443/udp"  # HTTP/3 (опционально, можно убрать)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile   # наш конфиг
      - caddy_data:/data                   # сертификаты (персистентны)
      - caddy_config:/config               # кэш конфига
